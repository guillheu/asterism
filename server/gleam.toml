name = "server"
version = "1.0.0"
target = "erlang"

# Fill out these fields if you intend to generate HTML documentation or publish
# your project to the Hex package manager.
#
# description = ""
# licences = ["Apache-2.0"]
# repository = { type = "github", user = "", repo = "" }
# links = [{ title = "Website", href = "" }]
#
# For a full reference of all the available options, you can have a look at
# https://gleam.run/writing-gleam/gleam-toml/.

internal_modules = ["server/internal", "server/internal/*" ]

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
lustre = ">= 5.6.0 and < 6.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
mist = ">= 5.0.4 and < 6.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
clique = { git = "git@github.com:hayleigh-dot-dev/clique.git", ref = "main" }
gleaph = ">= 2.0.0 and < 3.0.0"
gleam_community_maths = ">= 2.0.1 and < 3.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
lustre_dev_tools = ">= 2.3.4 and < 3.0.0"

[tools.lustre.bin]
tailwindcss = "system"
bun = "system"
